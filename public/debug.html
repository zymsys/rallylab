<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RallyLab — Debug View</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif; }

    .debug-toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 4px 10px;
      background: #252540;
      border-bottom: 1px solid #333;
    }
    .back-link {
      color: #60a5fa;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .back-link:hover { text-decoration: underline; }
    .mode-label {
      font-size: 0.75rem;
      color: #888;
    }
    .mode-label .mode-value {
      font-weight: 600;
      color: #4ade80;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      height: calc(100vh - 29px);
      padding: 4px;
    }

    .grid.with-fake-track {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }
    .grid.with-fake-track .panel-operator { grid-row: 1 / 3; }

    .panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: 1px solid #333;
      border-radius: 4px;
      overflow: hidden;
    }

    .panel-label {
      background: #252540;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      flex-shrink: 0;
    }

    .panel-operator .panel-label { color: #60a5fa; }
    .panel-fake-track .panel-label { color: #f59e0b; }
    .panel-audience .panel-label { color: #4ade80; }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }

    .panel-audience iframe { background: #0a0a1a; }

    /* Scale audience content to fit panel — render at 2x then shrink */
    .panel-audience .iframe-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .panel-audience iframe {
      position: absolute;
      width: 200%;
      height: 200%;
      transform: scale(0.5);
      transform-origin: 0 0;
      flex: none;
    }
  </style>
</head>
<body>
  <div class="debug-toolbar">
    <a href="registration.html" class="back-link">&larr; Back to Registration</a>
    <span class="mode-label">Track: <span class="mode-value" id="mode-value">—</span></span>
  </div>
  <div class="grid" id="grid">
    <div class="panel panel-operator">
      <div class="panel-label">Operator</div>
      <iframe src="operator.html"></iframe>
    </div>
    <div class="panel panel-fake-track" id="fake-track-panel" hidden>
      <div class="panel-label">Fake Track</div>
      <iframe id="fake-track-iframe"></iframe>
    </div>
    <div class="panel panel-audience">
      <div class="panel-label">Audience Display</div>
      <div class="iframe-wrap">
        <iframe src="audience.html"></iframe>
      </div>
    </div>
  </div>
  <script>
    const grid = document.getElementById('grid');
    const panel = document.getElementById('fake-track-panel');
    const iframe = document.getElementById('fake-track-iframe');
    const modeValue = document.getElementById('mode-value');

    const labels = { serial: 'USB Serial', wifi: 'WiFi', fake: 'Fake Track', manual: 'Manual' };

    function setMode(mode) {
      modeValue.textContent = labels[mode] || mode;
      const realTrack = mode === 'wifi' || mode === 'serial';
      if (realTrack) {
        panel.hidden = true;
        grid.classList.remove('with-fake-track');
      } else {
        panel.hidden = false;
        if (!iframe.src) iframe.src = 'fake-track.html';
        grid.classList.add('with-fake-track');
      }
    }

    // Default: show fake track until we hear otherwise
    setMode('manual');

    const ch = new BroadcastChannel('rallylab-track-mode');
    ch.onmessage = (e) => setMode(e.data);
  </script>
</body>
</html>
